version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/hrms
      REDIS_URL: redis://redis:6379
      REDIS_RATE_LIMIT_ENABLED: "true"
    depends_on:
      - mongo
      - redis

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
    depends_on:
      - server

volumes:
  mongo_data:
