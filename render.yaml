services:
  - type: web
    name: hrms-api
    runtime: node
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.18.0
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_RATE_LIMIT_ENABLED
        value: "true"
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_MASTER_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: COOKIE_SAME_SITE
        value: none
      - key: HR_AUTOMATION_ENABLED
        value: "true"
      - key: HR_AUTOMATION_INTERVAL_MS
        value: "21600000"
      - key: ATTENDANCE_RECONCILIATION_DAYS
        value: "7"
      - key: DB_SYNC_INDEXES
        value: "true"
